#=====================================================================================
# Build OpenWrt for Lenovo ECB-PR51 (RK3568)
# https://github.com/ophub/flippy-openwrt-actions
#=====================================================================================

name: Build OpenWrt for ECB-PR51

on:
  repository_dispatch:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize environment
        run: |
          sudo -E apt-get update
          sudo -E apt-get install -y git make curl wget xz-utils
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /builder
          sudo chown -R runner:runner /builder
          df -h

      - name: Create virtual disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6 /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -h

      - name: Download OpenWrt rootfs
        id: download
        working-directory: /builder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p opt/download
          
          # 使用 ophub 提供的预编译 Lean OpenWrt rootfs (稳定可靠)
          ROOTFS_URL="https://github.com/ophub/amlogic-s9xxx-openwrt/releases/download/OpenWrt_ledes_master_save_2026.03/openwrt-armsr-armv8-generic-rootfs.tar.gz"
          
          echo "Downloading OpenWrt rootfs from: $ROOTFS_URL"
          curl -L --fail -o opt/download/openwrt-armsr-armv8-generic-rootfs.tar.gz "$ROOTFS_URL"
          
          # 验证下载
          if [ ! -f opt/download/openwrt-armsr-armv8-generic-rootfs.tar.gz ]; then
            echo "ERROR: Failed to download rootfs"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s opt/download/openwrt-armsr-armv8-generic-rootfs.tar.gz 2>/dev/null || stat -f%z opt/download/openwrt-armsr-armv8-generic-rootfs.tar.gz)
          echo "Downloaded file size: $FILE_SIZE bytes"
          
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "ERROR: File too small, download may have failed"
            exit 1
          fi
          
          ls -la opt/download/
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Package OpenWrt Firmware for ECB-PR51
        id: package
        if: steps.download.outputs.status == 'success'
        uses: ophub/flippy-openwrt-actions@main
        env:
          OPENWRT_ARMSR: opt/download/*rootfs.tar.gz
          PACKAGE_SOC: diy
          SCRIPT_REPO_URL: cuihao99090587/openwrt_packit
          SCRIPT_DIY: mk_rk3568_ecb-pr51.sh
          SCRIPT_DIY_PATH: https://raw.githubusercontent.com/cuihao99090587/openwrt_packit/master/mk_rk3568_ecb-pr51.sh
          KERNEL_REPO_URL: ophub/kernel
          KERNEL_VERSION_NAME: 6.1.y
          KERNEL_AUTO_LATEST: true
          OPENWRT_IP: 192.168.1.1
          WHOAMI: ecb-pr51-builder

      - name: Upload firmware to Release
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        uses: ncipollo/release-action@main
        with:
          tag: OpenWrt_ECB-PR51_${{ env.PACKAGED_OUTPUTDATE }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## OpenWrt for Lenovo ECB-PR51
            
            **Device:** Lenovo ECB-PR51 (RK3568, 8GB DDR4, 32GB eMMC, SATA, Dual Gigabit Ethernet, AP6256 WiFi/BT)
            
            **Kernel:** Flippy 6.1.y series
            
            ### Default Settings
            - IP: 192.168.1.1
            - Username: root
            - Password: password
            
            ### Flash Instructions
            1. Write the `.img` file to eMMC using rkdeveloptool or dd
            2. Or write to a USB drive and boot from USB first
            
            Built with [flippy-openwrt-actions](https://github.com/ophub/flippy-openwrt-actions)
