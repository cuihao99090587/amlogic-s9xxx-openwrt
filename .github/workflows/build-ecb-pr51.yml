#=====================================================================================
# Build OpenWrt for Lenovo ECB-PR51 (RK3568)
# https://github.com/ophub/flippy-openwrt-actions
#=====================================================================================

name: Build OpenWrt for ECB-PR51

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-ecb-pr51.yml'

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize environment
        run: |
          sudo -E apt-get update
          sudo -E apt-get install -y git make curl wget xz-utils
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /builder
          sudo chown -R runner:runner /builder
          df -h

      - name: Create virtual disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6 /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -h

      - name: Package OpenWrt Firmware for ECB-PR51
        id: package
        uses: ophub/flippy-openwrt-actions@main
        env:
          OPENWRT_ARMSR: https://github.com/cuihao99090587/amlogic-s9xxx-openwrt/releases/download/OpenWrt_ECB-PR51_04.03.1709/openwrt-armsr-armv8-generic-rootfs.tar.gz
          PACKAGE_SOC: rk3568
          SCRIPT_REPO_URL: cuihao99090587/openwrt_packit
          SCRIPT_DIY: mk_rk3568_ecb-pr51.sh
          SCRIPT_DIY_PATH: https://raw.githubusercontent.com/cuihao99090587/openwrt_packit/master/mk_rk3568_ecb-pr51.sh
          KERNEL_REPO_URL: ophub/kernel
          KERNEL_VERSION_NAME: 6.12.y
          KERNEL_AUTO_LATEST: true
          OPENWRT_IP: 192.168.1.1
          WHOAMI: ecb-pr51-builder

      - name: Check packaging status
        run: |
          echo "=== Packaging Status Check ==="
          echo "PACKAGED_STATUS=${PACKAGED_STATUS:-NOT_SET}"
          echo "PACKAGED_OUTPUTPATH=${PACKAGED_OUTPUTPATH:-NOT_SET}"
          echo "PACKAGED_OUTPUTDATE=${PACKAGED_OUTPUTDATE:-NOT_SET}"
          
          if [ -n "${PACKAGED_OUTPUTPATH}" ] && [ -d "${PACKAGED_OUTPUTPATH}" ]; then
            echo ""
            echo "=== Generated Files ==="
            ls -la "${PACKAGED_OUTPUTPATH}/"
          fi

      - name: Integrate BRCM Firmware into image
        if: ${{ env.PACKAGED_STATUS == 'success' }}
        run: |
          echo "Integrating BRCM firmware into system image..."
          
          # Download firmware
          mkdir -p /tmp/brcm
          curl -sL "https://raw.githubusercontent.com/torvalds/linux-firmware/master/brcm/brcmfmac43456-sdio.bin" -o /tmp/brcm/brcmfmac43456-sdio.bin
          curl -sL "https://raw.githubusercontent.com/torvalds/linux-firmware/master/brcm/brcmfmac43456-sdio.clm_blob" -o /tmp/brcm/brcmfmac43456-sdio.clm_blob
          curl -sL "https://raw.githubusercontent.com/torvalds/linux-firmware/master/brcm/brcmfmac43456-sdio.txt" -o /tmp/brcm/brcmfmac43456-sdio.txt
          curl -sL "https://raw.githubusercontent.com/torvalds/linux-firmware/master/brcm/BCM4345C5.hcd" -o /tmp/brcm/BCM4345C5.hcd
          
          # Find the image file
          IMG_FILE=$(find "${PACKAGED_OUTPUTPATH}" -name "*.img.gz" 2>/dev/null | head -1)
          if [ -z "$IMG_FILE" ]; then
            echo "Error: No .img.gz file found in ${PACKAGED_OUTPUTPATH}"
            ls -la "${PACKAGED_OUTPUTPATH}/" 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi
          
          echo "Found image: $IMG_FILE"
          
          # Decompress
          gunzip -f "$IMG_FILE"
          IMG_FILE="${IMG_FILE%.gz}"
          echo "Decompressed to: $IMG_FILE"
          
          # Mount and copy firmware
          LOOP_DEV=$(losetup -f)
          losetup -P "$LOOP_DEV" "$IMG_FILE"
          mkdir -p /mnt/openwrt
          mount "${LOOP_DEV}p2" /mnt/openwrt
          
          # Copy firmware
          mkdir -p /mnt/openwrt/lib/firmware/brcm
          cp /tmp/brcm/* /mnt/openwrt/lib/firmware/brcm/
          chmod 644 /mnt/openwrt/lib/firmware/brcm/*
          
          # Enable modules
          echo "brcmfmac" >> /mnt/openwrt/etc/modules
          echo "btbcm" >> /mnt/openwrt/etc/modules
          
          umount /mnt/openwrt
          losetup -d "$LOOP_DEV"
          
          # Recompress
          gzip -9 "$IMG_FILE"
          
          echo "BRCM firmware integrated successfully"

      - name: Upload firmware to Release
        if: ${{ env.PACKAGED_STATUS == 'success' }}
        uses: ncipollo/release-action@main
        with:
          tag: OpenWrt_ECB-PR51_${{ env.PACKAGED_OUTPUTDATE }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## OpenWrt for Lenovo ECB-PR51
            
            **Device:** Lenovo ECB-PR51 (RK3568, 8GB DDR4, 32GB eMMC, SATA, Dual Gigabit Ethernet, AP6256 WiFi/BT)
            
            **Kernel:** Flippy 6.12.y series
            
            ### Hardware Support
            - Dual Gigabit Ethernet (RGMII)
            - SATA 3.0
            - WiFi 802.11ac (BCM4356) - Firmware integrated
            - Bluetooth 5.0 (BCM4356) - Firmware integrated
            - HDMI 4K@60fps
            - USB 3.0
            
            ### Package Contents
            - *.img.gz - OpenWrt firmware image (BRCM firmware integrated)
            
            ### Installation
            1. Write .img.gz to eMMC/USB
            2. Boot from eMMC/USB
            3. SSH to OpenWrt (192.168.1.1, root/password)
            4. WiFi/BT auto-enabled on boot
            
            ### Default Settings
            - IP: 192.168.1.1
            - Username: root
            - Password: password
            
            Built with flippy-openwrt-actions
